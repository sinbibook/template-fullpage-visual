<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/nearby-attractions.css">
</head>
<body>

    <!-- Navigation (Header) -->
    <div class="index-page">
        <div id="header-container"></div>
    </div>

    <div id="app" class="nearby-attractions-page">

        <!-- HERO SECTION -->
        <div class="main-section">
            <!-- custom field : 히어로 슬라이더 이미지 동적 생성 (mapper) -->
            <div class="main-bg" data-nearby-attractions-hero-slider></div>
            <div class="main-content">
                <!-- custom field : 주변 관광지 섹션 타이틀 매핑 -->
                <h1 class="main-title" data-nearby-attractions-hero-title></h1>
                <div class="title-divider"><div class="bar-progress"></div></div>
                <!-- custom field : 주변 관광지 섹션 설명 매핑 -->
                <p class="main-subtitle" data-nearby-attractions-hero-description></p>
            </div>
            <div class="main-arrow">
                <div class="arrow-left"></div>
                <p class="arrow-number">01</p>
                <div class="arrow-divider"></div>
                <p class="arrow-number" data-attractions-count>0</p>
                <div class="arrow-right"></div>
            </div>
        </div>

        <!-- ABOUT SECTION : 관광지 목록 -->
        <div class="section-attractions">
            <!-- 하드코딩, 매핑 x -->
            <p class="section-title">Attractions</p>
            <!-- custom field : 관광지 블록 동적 생성 (mapper) -->
            <div data-nearby-attractions-about></div>
        </div>

        <!-- CLOSING SECTION -->
        <div class="content-4 closing-section">
            <!-- custom field : 마무리 섹션 이미지 매핑 -->
            <div class="content-4-bg" data-closing-image></div>
            <div class="content-4-text">
                <!-- custom field : 마무리 섹션 제목 매핑 -->
                <h2 data-closing-title></h2>
                <!-- custom field : 마무리 섹션 내용 매핑 -->
                <p data-closing-description></p>
            </div>
        </div>

    </div>

    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="js/common.js"></script>
    <script src="js/pages/nearby-attractions.js"></script>

    <!-- Data Mapper -->
    <script src="js/image-helpers.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/data-mapper/pages/nearby-attractions-mapper.js"></script>
    <script src="js/preview-handler.js"></script>

    <!-- Header / Footer Loader -->
    <script src="js/header-footer-loader.js"></script>

    <!-- Enabled 상태 감시 (미노출 → 노출 변경 감지) -->
    <script>
        (function() {
            function checkPageEnabled() {
                if (!window.PreviewHandler || !window.PreviewHandler.currentData) return;

                const data = window.PreviewHandler.currentData;
                const enabled = data?.homepage?.customFields?.pages?.nearbyAttractions?.sections?.[0]?.enabled;

                if (enabled === false) {
                    location.replace('404.html');
                }
            }

            if (typeof window !== 'undefined' && window.parent === window) {
                window.addEventListener('DOMContentLoaded', () => {
                    setTimeout(checkPageEnabled, 500);
                    setInterval(checkPageEnabled, 1000);
                });

                // 탭이 활성화될 때 enabled 상태 확인
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) {
                        setTimeout(checkPageEnabled, 100);
                    }
                });
            }
        })();
    </script>
</body>
</html>
